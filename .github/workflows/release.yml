name: release

# Publishes a GitHub Release whenever a v* tag is pushed. The produced assets
# (ccinject-<os>-<arch> + checksums.txt) are exactly what scripts/install-binary.sh
# downloads and verifies, so /ccinject:setup works with no manual release steps.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required for gh release create to attach assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify tag matches plugin.json version
        run: |
          version=$(sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' .claude-plugin/plugin.json | head -1)
          if [ "v$version" != "$GITHUB_REF_NAME" ]; then
            echo "tag $GITHUB_REF_NAME does not match plugin.json version v$version" >&2
            exit 1
          fi

      - name: Test
        run: make test

      - name: Build binaries
        run: |
          mkdir -p dist
          for os in linux darwin; do
            for arch in amd64 arm64; do
              CGO_ENABLED=0 GOOS=$os GOARCH=$arch \
                go build -trimpath -ldflags="-s -w" \
                -o "dist/ccinject-$os-$arch" ./cmd/ccinject
            done
          done

      - name: Generate checksums
        # Bare filenames only (cd into dist) so the names match the asset names
        # that install-binary.sh greps for in checksums.txt.
        run: cd dist && sha256sum ccinject-* > checksums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --notes "ccinject ${GITHUB_REF_NAME#v} binaries"
